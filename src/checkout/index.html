<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Sleep Outside | Checkout</title>

    <link rel="stylesheet" href="../css/style.css" />
  </head>

  <body>
    <header class="divider" id="main-header">
    </header>

    <main class="divider">

        <h2>Review & Place your Order</h2>

        <section id="order-summary">
          <h3>
            Order Summary
          </h3>
          <p>
            Item Subtotal: <span id="subtotal">$0.00</span>
          </p>
          <p>
            Shipping Estimate: <span id="shipping">$0.00</span>
          </p>
          <p>
            Tax: <span id="tax">$0.00</span>
          </p>
          <p>
            <strong>
              Order Total:
            </strong> <span id="orderTotal">$0.00</span>
          </p>
        </section>

        <form id="checkout-form" name="checkout">
          <fieldset>
            <legend>
              Shipping & Billing
            </legend>
            <label>
              First Name: <input type="text" name="fname" required minlength="2">
            </label>
            <label> 
              Last Name: <input type="text" name="lname" required minlength="2">
            </label>
            <label>
              Street Address: <input type="text" name="street" required>
            </label>
            <label>
              City: <input type="text" name="city" required>
            </label>
            <label>
              State: <input type="text" name="state" required>
            </label>
            <label>
              Zip Code: <input type="text" name="zip" id="zip" required pattern="[0-9]{5}" title="5 digits number">
            </label>
          </fieldset>

          <fieldset>
            <legend>
              Payment
            </legend>
            <label>
              Credit Card Number: <input type="text" name="cardNumber" value="1234123412341234">
            </label>
            <label>
              Expiration Date: <input type="text" name="expiration" required value="12/26">
            </label>
            <label>
              Security Code: <input type="text" name="code" required value="123">
            </label>
          </fieldset>

          <button type="submit" id="checkoutSubmit">
            Submit Order
          </button>
        </form>
    </main>

    <footer id="main-footer"></footer>
     <script src="../js/checkout.js" type="module"></script>
  </body>
</html>
